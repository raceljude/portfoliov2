<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #0c1018;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .bg-orb {
    position: absolute; border-radius: 50%;
    filter: blur(100px); pointer-events: none;
  }
  .orb1 { width: 500px; height: 500px; left: -100px; top: -100px; background: #d1675a; opacity: 0.15; }
  .orb2 { width: 400px; height: 400px; right: -80px; bottom: -80px; background: #398eb2; opacity: 0.12; }
  .orb3 { width: 300px; height: 300px; right: 200px; top: 50px; background: #ffbf6b; opacity: 0.07; }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(57,142,178,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,142,178,0.07) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: flex-start;
    padding: 70px 90px; width: 100%; height: 100%;
    justify-content: space-between;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,191,107,0.12); border: 1px solid rgba(255,191,107,0.3);
    border-radius: 999px; padding: 6px 16px;
    font-size: 13px; font-family: 'Courier New', monospace;
    color: #ffbf6b; letter-spacing: 2px; text-transform: uppercase;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ffbf6b; }
  .main { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 16px; }
  .name {
    font-size: 72px; font-weight: 900; line-height: 1;
    color: #f0ece8; letter-spacing: -2px;
  }
  .name span { color: #d1675a; }
  .title {
    font-size: 26px; font-family: 'Courier New', monospace;
    color: #398eb2; letter-spacing: 3px; text-transform: uppercase;
  }
  .desc {
    font-size: 18px; color: #8aa8bc; max-width: 680px;
    line-height: 1.6; margin-top: 4px;
  }
  .footer {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding-top: 24px;
    border-top: 1px solid rgba(30,42,58,0.8);
  }
  .skills { display: flex; gap: 10px; flex-wrap: wrap; }
  .pill {
    background: rgba(14,30,44,0.9); border: 1px solid #1e2a3a;
    border-radius: 8px; padding: 6px 14px;
    font-size: 13px; font-family: 'Courier New', monospace;
    color: #4a6a80;
  }
  .location {
    font-size: 14px; font-family: 'Courier New', monospace;
    color: #2a4a60; letter-spacing: 1px;
  }
  .logo {
    font-size: 22px; font-weight: 900; letter-spacing: -1px; color: #f0ece8;
  }
  .logo span { color: #d1675a; }
</style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>
  <div class="grid"></div>
  <div class="content">
    <div class="badge"><span class="dot"></span>Open to opportunities</div>
    <div class="main">
      <div class="name">Racel Jude <span>Marahay</span></div>
      <div class="title">Software Developer</div>
      <div class="desc">
        Building full-stack apps and automated business systems.<br>
        MERN/PERN · React · Node.js · Google Workspace · Metro Manila, PH
      </div>
    </div>
    <div class="footer">
      <div class="skills">
        <span class="pill">React</span>
        <span class="pill">TypeScript</span>
        <span class="pill">Node.js</span>
        <span class="pill">Google Workspace</span>
        <span class="pill">PostgreSQL</span>
      </div>
      <div class="logo">RJ <span>·</span> raceljude@gmail.com</div>
    </div>
  </div>
</body>
</html>
